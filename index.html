<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SkillShift" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SkillShift Planner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>SkillShift Planner</h1>
      <p>파트 · 스테이션 · Level/Step 기반 근무표 & 인건비 관리</p>
    </div>
    <div class="header-actions">
      <button id="saveBtn" class="btn secondary">저장</button>
      <button id="exportBtn" class="btn secondary">JSON 내보내기</button>
      <label class="btn secondary file-label">JSON 가져오기<input id="importFile" type="file" accept="application/json" /></label>
      <button id="resetBtn" class="btn danger">샘플 초기화</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main class="app-main">
    <section id="dashboard" class="tab-panel active"></section>
    <section id="parts" class="tab-panel"></section>
    <section id="skills" class="tab-panel"></section>
    <section id="members" class="tab-panel"></section>
    <section id="requirements" class="tab-panel"></section>
    <section id="schedule" class="tab-panel"></section>
    <section id="labor" class="tab-panel"></section>
    <section id="validation" class="tab-panel"></section>
    <section id="roadmap" class="tab-panel"></section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
